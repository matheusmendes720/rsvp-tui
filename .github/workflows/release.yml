name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: "build (${{ matrix.target }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: rsvp-cli-linux-x64.tar.xz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: rsvp-cli-windows-x64.zip
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: rsvp-cli-macos-x64.tar.xz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: rsvp-cli-linux-arm64.tar.xz
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build rsvp-cli release
        working-directory: rsvp-cli
        run: cargo build --release --target ${{ matrix.target }} --locked
      - name: Strip the binary
        working-directory: rsvp-cli
        run: |
          BIN=target/${{ matrix.target }}/release/rsvp${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          strip "$BIN" || true
      - name: Package
        working-directory: rsvp-cli
        run: |
          cd target/${{ matrix.target }}/release
          BIN=rsvp${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a ../../../${{ matrix.archive }} "$BIN" 2>/dev/null \
              || zip ../../../${{ matrix.archive }} "$BIN"
          else
            tar -cJf ../../../${{ matrix.archive }} "$BIN"
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: rsvp-cli/${{ matrix.archive }}

  release:
    name: "github release"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: true   # require a human to publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
